    <style>
        html,
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;

        .mainbody {
            display: flex;
            align-items: center;
            margin: 70px auto 0;
            min-width: 1200px;
            min-height: 800px;
            height: calc(100vh - 70px);
        }

        .bread-head {
            position: absolute;
            margin: 0 auto;
            top: 0;
            left: 0;

            height: 70px;
            background: #000;
            z-index: 9;
        }

        .center-box {
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            margin: 0 auto;
            width: calc(100% - 80px);
            height: calc(100% - 80px);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.7);
        }

        .top {
            position: relative;
            margin: 0 auto;
            flex: 1;
            height: 600px;
            width: 100%;
        }

        .bottom {
            display: flex;
            justify-content: space-between;
            /* border-top-width: 3px;
            border-color: rgba(0, 0, 0, 0.7);
            border-top-style: dashed; */
            height: 280px;
            padding: 0 56px;
        }

        .top {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container {
            position: relative;
            justify-content: center;
            align-items: center;
            width: calc(50% - 57px);
            height: calc(100% - 57px);
            background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAABeSURBVDhP7dAxCwAhCIZh//9fDYVyKgcPHSPF4UY/eLklno5Ai2NmRUQlorQG4zUYVgbXWv+DYwxHs8AOZs05/bv31nOOJyJh8Lrlzv7MoMrg9Q53hjYYrsF3dVD1AyI6EcVRcDK0AAAAAElFTkSuQmCC")repeat;
            overflow: auto;
        }

        .split {
            width: 2px;
            height: calc(100% - 60px);
            background: rgba(0, 0, 0, 0.7);
        }

        #drop-tip-box {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 999;
            pointer-events: none;

            flex-direction: column;
            flex-wrap: wrap;

            justify-content: center;

        }

            left: 50%;

            padding: 15px 15px 15px 20px;

            border-style: solid;
            border-radius: 4px;

            font-size: 14px;

        }

        .el-radiobox input {

            margin: 1px;
            position: relative;
            appearance: none;
            -moz-appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 1px solid #acaeb3;
            border-radius: 100%;
            transition: all 0.3s;
            outline: none;
            vertical-align: top;
        }

        .el-radiobox input:hover,
        input:focus {
            border-color: #a940ff;
        }

        .el-radiobox input:checked {
            background-color: #a940ff;
            border-color: #a940ff;
        }

        .el-radiobox input:checked+span {
            color: #a940ff;
        }


        .el-radiobox input:checked::before {
            content: "";

            width: 4px;
            height: 4px;
            top: 50%;
            left: 50%;

            border-radius: 100%;

        .fieldset-container {
            padding: 8px 10px 15px 10px;

            border: 1px solid #d4d4d4;

        .fieldset-box {

            border: 1px solid #d4d4d4;
        }

        .el-select {
            width: 160px;
            box-sizing: border-box;

        }

        .el-select-on .ul-contain {

        }


        .el-select .el-select-head {
            cursor: pointer;
            outline: none;
            padding: 0 20px 0 15px;
            display: inline-block;
            font-size: inherit;
            height: 40px;
            width: 160px;
            color: #606266;
            line-height: 40px;
            background-color: #fff;
            background-image: none;
            border-radius: 4px;
            border: 1px solid #dcdfe6;
            box-sizing: border-box;
            transition: border-color .2s cubic-bezier(.645, .045, .355, 1);
            overflow: hidden;
            outline: none;
        }

        .el-select .el-select-head:hover {

        }

        .el-select .el-select-head-focus {
            border-color: #a940ff !important;
        }

        .el-select {
            margin-left: 10px;
            vertical-align: text-top;
            display: inline-block;
            position: relative;
        }

        .el-select ul::before {
            content: "";
            display: block;
            width: 8px;
            height: 8px;
            position: absolute;
            top: -4px;
            left: 15px;
            z-index: 9;
            background: #fff;
            transform: rotate(45deg);
        }


        .el-select::after {
            content: "";
            display: block;
            position: absolute;
            width: 7px;
            height: 7px;
            top: 13px;
            right: 10px;
            border-width: 1px 1px 0 0;
            border-style: solid;
            border-color: gray;
            transform: rotate(135deg);
            transition: all 0.3s;
            user-select: none;
        }

        .el-select-on::after {
            transform: rotate(315deg);

        .ul-contain {

            overflow: hidden;
            transition: height 0.3s;
        }

        .el-select ul {
            z-index: 9;

            padding: 5px 0;
            width: 160px;
            max-height: 216px;
            background: #fff;
            border: 1px solid #e4e7ed;
            border-radius: 4px;
            background-color: #fff;

            overflow-x: hidden;

        .el-select ul li {
            text-decoration: aliceblue;

            padding-left: 13px;
            padding-right: 13px;
            height: 34px;
            line-height: 34px;

            white-space: nowrap;

        .el-select .is-select {

        .el-select .is-hover {
            background-color: rgb(240, 240, 240);

        }

        }

        .show-color {

        }


        .show-color-indicate {
            width: 100%;
            height: 100%;
        }

        .show-color::after {
            content: "";
            position: absolute;
            display: block;
            left: 15px;
            top: 14px;
            width: 6px;
            height: 6px;
            border-width: 1px 1px 0 0;
            border-style: solid;
            border-color: #fff;
            transform: rotate(135deg);
        }

        .select-color-wrap {
            position: fixed;

            left: 0;
            z-index: 9999;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .select-color-content {
            position: absolute;
            z-index: 99999;
            padding: 15px 15px 20px 20px;
            top: 50%;
            left: 50%;
            width: 720px;
            height: 630px;

            margin-left: -315px;

        .color-div {
            cursor: pointer;

            display: inline-block;
            vertical-align: top;
            width: 35px;
            height: 35px;

            border-radius: 5px;
        }

        .color-div:last-child {
            border: 2px solid #fff;
        }

        .color-div:last-child::after {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
        }

        .color-selected::before {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
        }

        .color-selected::after {
            display: none !important;
        }

        .select-color-bottom {

            flex-direction: row-reverse;

        .select-color-bottom button:last-child {

        }

        button {

        .picker-enter-active {

        .picker-leave-active {

        .group3 {

        .group3-top {

        }

        }

        .progress-bottom {

<body>
    <div id='app'>
        <transition name='progress'>
            <el-progress :progress='progress' v-show='showProgress' @close='showProgress = false'>{{progressTip}}
            </el-progress>
        </transition>
        <transition name='picker'>
            <el-color-picker :colortable='colortable' @select-color='selectBkColor'
                @select-color-close='closeColorPicker' v-show='showColorPicker'></el-color-picker>
        </transition>
        <header class='bread-head'>
            <div class='head'>

                <div class='nav-list-box'>迷你世界像素图生成器</div>
            </div>
        </header>
        <div class='mainbody' @dragenter.stop='checkInDropBox($event, true)'
            @dragleave.stop='checkInDropBox($event, false)' @dragover.stop.prevent @drop.stop.prevent>
            <div class='center-box'>
                <div class='top'>
                    <label class='click-upload-box' for='uploadfile'>
                        点击上传图片
                        <input type='file' id='uploadfile' style='display: none;' accept="image/*"
                            @change='handleUploadFile'>
                    </label>
                    <div class='image-container-left image-container' ref='dropbox' @drop='dropfile'>
                        <img :src="imageBase64Data" class='srcimg' @load='imgload'>
                        <div id='drop-tip-box' v-bind:class="{'drop-tip-box-on': isdorpin}" ref='drop-tip-box'>
                            <img
                                src='aaa.png'>
                            <span id='#drop-tip'>{{ tipStr }}</span>
                        </div>
                    </div>
                    <span class='split'></span>
                    <div class='image-container-right image-container'>
                        <img :src='destImageBase64Data' class='show-dest-img'>
                    </div>
                </div>
                <div class='bottom'>
                    <div class='group1 group'>
                        <el-input-box @input='inputImageWidth' :value='destImgWidth' ref='input-w'>生成的像素图宽
                        </el-input-box>
                        <el-checkbox v-model='lockWH' class='lock-w-and-h'>锁定宽高比例</el-checkbox>
                        <el-input-box @input='inputImageHeight' :value='destImgHeight' ref='input-h'>生成的像素图高
                        </el-input-box>
                        <fieldset class="fieldset-container">
                            <legend>像素面的方向</legend>
                            <fieldset class="fieldset-box">
                                <el-radiobox name='face_isvertical' value='0' v-model='face_v'>垂直于地面</el-radiobox>
                                <el-radiobox name='face_isvertical' value='1' v-model='face_v'>平行于地面</el-radiobox>
                            </fieldset>
                            <fieldset class="fieldset-box">
                                <el-radiobox name='face_h' value='1' v-model='face_h'>东</el-radiobox>
