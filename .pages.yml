# 图片上传配置（VitePress public标准路径）
media:
  input: public/posts
  output: /posts

# 内容集合
content:
  # 1. BA主题博客文章（核心）
  - name: posts
    label: 博客文章
    type: collection
    path: /posts
    filename: "{year}-{month}-{day}-{slug}.md"
    view:
      fields: [title, date, cover, tags, pinned]
    fields:
      - name: title
        label: 文章标题
        type: string
        required: true
      - name: date
        label: 发布日期
        type: date
        required: true
      - name: update
        label: 更新日期
        type: date
      - name: cover
        label: 封面图
        type: image
      - name: tags
        label: 标签
        type: list
        of: string
        default: []
      - name: pinned
        label: 置顶文章
        type: switch
        default: false
      - name: excerpt
        label: 文章摘要
        type: string
      - name: head
        label: SEO配置
        type: object
        fields:
          - name: metaDesc
            label: 页面描述(description)
            type: string
          - name: metaKeywords
            label: 页面关键词(keywords)
            type: string
      - name: body
        label: 正文内容
        type: rich-text
        formats:
          - markdown